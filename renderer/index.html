<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>職業大冒險</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 開始畫面 -->
  <div id="screen-start" class="screen">

    <!-- 上方主視覺區（60%） -->
    <div class="start-hero">
      <h1 class="start-title">職業大冒險</h1>
      <p class="start-subtitle">選擇你的職業，踏上棋盤冒險</p>
    </div>

    <!-- 下方按鈕區（40%） -->
    <div class="start-buttons">
      <div class="btn-group">
        <button class="btn btn-gold" id="btn-new-game">▶ 開始新遊戲</button>
        <button class="btn btn-gray" disabled>↩ 繼續遊戲</button>
        <button class="btn btn-gray" id="btn-meta-shop">🏪 周目解鎖</button>
      </div>
      <p class="start-score" id="start-score-display">累積分數：0 分</p>
    </div>

  </div>

  <!-- 職業選擇畫面 -->
  <div id="screen-job-select" class="screen">

    <!-- 頂部標題列 -->
    <div class="jobselect-header">
      <h2 class="jobselect-title">選擇你的職業</h2>
    </div>

    <!-- 中央職業展示區 -->
    <div class="jobselect-main">
      <button class="job-nav-btn" id="btn-job-prev">◀</button>

      <!-- 職業卡片 -->
      <div class="job-card">
        <div class="job-card-color" id="job-color"></div>
        <div class="job-card-info">
          <h3 class="job-card-name" id="job-name"></h3>
          <div class="job-stats">
            <div class="job-stat"><span class="stat-label">HP</span><span class="stat-value" id="stat-hp"></span></div>
            <div class="job-stat"><span class="stat-label">攻擊</span><span class="stat-value" id="stat-atk"></span></div>
            <div class="job-stat"><span class="stat-label">防禦</span><span class="stat-value" id="stat-def"></span></div>
            <div class="job-stat"><span class="stat-label">閃避率</span><span class="stat-value" id="stat-dodge"></span></div>
            <div class="job-stat"><span class="stat-label">爆擊率</span><span class="stat-value" id="stat-crit"></span></div>
            <div class="job-stat"><span class="stat-label">爆擊傷害</span><span class="stat-value" id="stat-critdmg"></span></div>
          </div>
          <div class="job-features" id="job-features"></div>
        </div>
      </div>

      <button class="job-nav-btn" id="btn-job-next">▶</button>
    </div>

    <!-- 圓點指示器 -->
    <div class="job-dots" id="job-dots"></div>

    <!-- 底部按鈕 -->
    <div class="jobselect-footer">
      <button class="btn btn-gold btn-wide" id="btn-select-job">選擇此職業</button>
    </div>

  </div>

  <!-- 棋盤主畫面 -->
  <div id="screen-board" class="screen">

    <!-- 頂部狀態列 -->
    <div class="board-status">
      <span id="board-job-info" class="status-left"></span>
      <span id="board-turn" class="status-center"></span>
      <span id="board-gold" class="status-right"></span>
    </div>

    <!-- 棋盤區 -->
    <div class="board-area">
      <div class="board-grid" id="board-grid">
        <!-- 格子由 JS 動態生成 -->
        <!-- 骰子控制區（棋盤中央） -->
        <div class="dice-center" id="dice-center">
          <div class="dice-face" id="dice-face">?</div>
          <button class="btn btn-gold dice-btn" id="btn-roll">🎲 擲骰子</button>
          <div class="dice-msg" id="dice-msg"></div>
        </div>
      </div>
    </div>

    <!-- 底部資訊列 -->
    <div class="board-info-bar">
      <span class="info-cell-desc" id="board-cell-desc"></span>
      <div class="info-inventory" id="board-inventory">
        <span class="inv-slot">空</span>
        <span class="inv-slot">空</span>
        <span class="inv-slot">空</span>
      </div>
    </div>

    <!-- GM Tools（開發用，上線前移除） -->
    <div id="gm-tools" class="gm-panel">
      <div class="gm-title">🛠 GM Tools</div>
      <div class="gm-section-label">觸發格子類型</div>
      <div class="gm-btn-row">
        <button class="gm-btn" id="gm-battle">⚔️ 戰鬥格</button>
        <button class="gm-btn" id="gm-item">🎁 道具格</button>
        <button class="gm-btn" id="gm-event">📖 事件格</button>
      </div>
      <div class="gm-btn-row">
        <button class="gm-btn" id="gm-shop">🏪 商店格</button>
        <button class="gm-btn" id="gm-trap">💀 陷阱格</button>
        <button class="gm-btn" id="gm-bless">✨ 祝福格</button>
      </div>
      <div class="gm-section-label">Boss 戰鬥</div>
      <div class="gm-btn-row">
        <button class="gm-btn" id="gm-boss-flame">🔥 火焰Boss</button>
        <button class="gm-btn" id="gm-boss-shadow">🌑 暗影Boss</button>
        <button class="gm-btn" id="gm-boss-astral">⭐ 星界Boss</button>
      </div>
      <div class="gm-btn-row">
        <button class="gm-btn" id="gm-boss-final">👁️ 最終Boss</button>
      </div>
      <div class="gm-section-label">快速調整</div>
      <div class="gm-btn-row">
        <button class="gm-btn" id="gm-add-gold">+100 金幣</button>
        <button class="gm-btn" id="gm-lose-hp">-50 HP</button>
        <button class="gm-btn" id="gm-upgrade">升級畫面</button>
      </div>
      <div class="gm-btn-row">
        <button class="gm-btn" id="gm-set-turn-20">回合→20</button>
      </div>
    </div>

  </div>

  <!-- 戰鬥畫面 -->
  <div id="screen-battle" class="screen">

    <!-- 頂部狀態列 -->
    <div class="battle-status">
      <span id="battle-round" class="battle-status-left">戰鬥回合 1</span>
      <span id="battle-phase" class="battle-status-center">我方行動</span>
      <div class="battle-status-right">
        <button class="battle-icon-btn">📋</button>
        <button class="battle-icon-btn">⚙️</button>
      </div>
    </div>

    <!-- 戰鬥表演區 -->
    <div class="battle-stage">

      <!-- 左側：我方角色 -->
      <div class="battle-player">
        <div class="battle-sprite player-sprite" id="player-sprite"></div>
        <div class="battle-name" id="player-name"></div>
        <div class="hp-bar-wrap">
          <div class="hp-bar" id="player-hp-bar"></div>
        </div>
        <div class="hp-text" id="player-hp-text"></div>
      </div>

      <!-- 右側：敵方區域 -->
      <div class="battle-enemies" id="battle-enemies">
        <!-- 敵人由 JS 動態生成 -->
      </div>

    </div>

    <!-- 資訊操作區 -->
    <div class="battle-bottom">

      <!-- 左側：資訊面板 -->
      <div class="battle-info-panel">
        <div class="info-tabs">
          <button class="info-tab active" id="tab-player" data-tab="player">我方</button>
          <button class="info-tab" id="tab-enemy" data-tab="enemy">敵人</button>
        </div>
        <div class="info-content" id="info-content">
          <!-- 由 JS 動態更新 -->
        </div>
        <div class="info-ailments">
          <span class="ailment-label">狀態異常：</span>
          <span id="ailment-list">無</span>
        </div>
      </div>

      <!-- 右側：行動選單 -->
      <div class="battle-actions">
        <button class="btn btn-gold action-btn" id="btn-attack">普攻</button>
        <button class="btn btn-gray action-btn" disabled>技能 1（空）</button>
        <button class="btn btn-gray action-btn" disabled>技能 2（空）</button>
        <button class="btn btn-gray action-btn" disabled>技能 3（空）</button>
        <div class="action-log" id="action-log"></div>
      </div>

    </div>

  </div>

  <!-- 升級選擇畫面 -->
  <div id="screen-upgrade" class="screen">

    <!-- 頂部狀態列（高度 80px） -->
    <div class="upgrade-header">
      <div class="upgrade-level-text" id="upgrade-level-text">⭐ 升級！</div>
      <div class="upgrade-skills-bar" id="upgrade-skills-bar">
        <!-- 技能欄由 JS 動態生成 -->
      </div>
    </div>

    <!-- 中央三張卡片 -->
    <div class="upgrade-cards" id="upgrade-cards">
      <!-- 卡片由 JS 動態生成 -->
    </div>

    <!-- 底部確認區（高度 60px） -->
    <div class="upgrade-footer">
      <button class="btn btn-gold btn-wide" id="btn-confirm-upgrade" disabled>確認選擇</button>
    </div>

  </div>

  <!-- 事件畫面 -->
  <div id="screen-event" class="screen">

    <!-- 左側場景區（35%） -->
    <div class="event-scene" id="event-scene">
      <div class="event-scene-emoji" id="event-scene-emoji"></div>
      <div class="event-type-label" id="event-type-label"></div>
    </div>

    <!-- 右側文字選項區（65%） -->
    <div class="event-panel">
      <div class="event-title" id="event-title"></div>
      <div class="event-desc" id="event-desc"></div>
      <div class="event-options" id="event-options">
        <!-- 選項按鈕由 JS 動態生成 -->
      </div>
      <div class="event-result" id="event-result">
        <div class="event-result-text" id="event-result-text"></div>
        <button class="btn btn-gold btn-wide" id="btn-event-continue">繼續前進</button>
      </div>
    </div>

  </div>

  <!-- 道具畫面 -->
  <div id="screen-item" class="screen">

    <!-- 頂部：當前道具欄（3格） -->
    <div class="item-header">
      <div class="item-header-label">道具欄</div>
      <div class="item-slots" id="item-slots">
        <!-- 由 JS 動態生成 -->
      </div>
    </div>

    <!-- 中央：三張道具卡片 -->
    <div class="item-cards" id="item-cards">
      <!-- 由 JS 動態生成 -->
    </div>

    <!-- 底部：確認與放棄按鈕 -->
    <div class="item-footer">
      <button class="btn btn-gold btn-wide" id="btn-confirm-item" disabled>放入道具欄</button>
      <button class="btn btn-gray btn-skip" id="btn-skip-item">放棄不選擇</button>
    </div>

  </div>

  <!-- 商店畫面 -->
  <div id="screen-shop" class="screen">

    <!-- 頂部：金幣 + 道具欄 -->
    <div class="shop-header">
      <div class="shop-gold">💰 金幣：<span id="shop-gold-amount">0</span></div>
      <div class="shop-inventory-label">道具欄</div>
      <div class="item-slots" id="shop-item-slots">
        <!-- 由 JS 動態生成 -->
      </div>
    </div>

    <!-- 中央：商品列表（4列） -->
    <div class="shop-list" id="shop-list">
      <!-- 由 JS 動態生成 -->
    </div>

    <!-- 底部：離開按鈕 -->
    <div class="shop-footer">
      <button class="btn btn-gray btn-wide" id="btn-leave-shop">離開商店</button>
    </div>

  </div>

  <!-- 死亡畫面 -->
  <div id="screen-death" class="screen">
    <div class="death-container">
      <h1 class="death-title">GAME OVER</h1>
      <h2 class="death-subtitle">你被黑暗吞噬了...</h2>
      <div class="death-stats" id="death-stats">
        <p>生存回合：<span id="death-stat-turn">0</span></p>
        <p>最終等級：<span id="death-stat-level">1</span></p>
      </div>
      <div class="death-footer">
        <button class="btn btn-gray btn-wide" onclick="returnToTitle()">返回標題</button>
      </div>
    </div>
  </div>

  <!-- 結算畫面 -->
  <div id="screen-result" class="screen">
    <div class="result-container">
      <h1 class="result-title">VICTORY</h1>
      <h2 class="result-subtitle">冒險完成！黑暗已被驅散</h2>

      <div id="result-seal-badge" class="hidden">
        ✨ 完美通關：三大封印完全解除 ✨
      </div>

      <div class="result-stats">
        <p>基礎分數：<span id="score-base">0</span></p>
        <p>速戰加成：<span id="score-turn">0</span></p>
        <p>健康狀態加成：<span id="score-hp">0</span></p>
        <hr>
        <p class="score-total-line">本次獲得分數：<span id="score-total" class="gold-text">0</span></p>
        <p class="score-global-line">全域總積分：<span id="score-global">0</span></p>
      </div>
      <div class="result-footer">
        <button class="btn btn-gold btn-wide" onclick="finishGame()">完成並返回標題</button>
      </div>
    </div>
  </div>

  <!-- 周目解鎖商店 -->
  <div id="screen-meta-shop" class="screen">

    <!-- 頂部：積分 + 返回 -->
    <div class="meta-shop-header">
      <div class="meta-score-label">全域總積分：<span id="meta-global-score">0</span> 分</div>
      <button class="btn btn-gray" onclick="leaveMetaShop()">← 返回開始畫面</button>
    </div>

    <!-- 分頁列 -->
    <div class="meta-tabs" id="meta-tabs">
      <!-- 由 JS 動態渲染 -->
    </div>

    <!-- 卡片網格 -->
    <div class="meta-cards-container" id="meta-cards-container">
      <!-- 由 JS 動態渲染 -->
    </div>

  </div>

  <script src="data/jobs.js"></script>
  <script src="data/items.js"></script>
  <script src="data/enemies.js"></script>
  <script src="data/meta.js"></script>
  <script src="game.js"></script>
</body>
</html>
